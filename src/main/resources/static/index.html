<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <title>Job Organizer</title>
</head>
<body>
<h1>Job Organizer</h1>

<label>Job Title:
    <input type="text" id="jobTitle">
</label>

<label>Location:
    <input type="text" id="location">
</label>

<label>Company:
    <input type="text" id="company">
</label>

<label>Job Salary:
    <input type="number" id="salary">
</label>

<label>Desired Salary:
    <input type="number" id="desiredSalary">
</label>

<label>Status:
    <select id="status">
        <option value="PENDING">Pending</option>
        <option value="ACCEPTED">Accepted</option>
        <option value="REJECTED">Rejected</option>
    </select>
</label>

<button id="submitBtn">Submit Job</button>
<div class="result" id="result"></div>

<button id="viewBtn">View All Jobs</button>

<table id="allJobs" class="result">
    <thead>
    <tr>
        <th>Title</th>
        <th>Company</th>
        <th>Location</th>
        <th>Salary</th>
        <th>Desired</th>
        <th>Status</th>
        <th>Match</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="app.js"></script>
</body>
</html>
